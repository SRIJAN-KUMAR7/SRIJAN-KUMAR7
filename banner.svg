<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1100" viewBox="0 0 900 1100">
  <defs>
    <style>
      @keyframes glitchPulse {
        0% { text-shadow: -2px 0 red, 2px 0 blue; }
        50% { text-shadow: 2px 0 red, -2px 0 blue; }
        100% { text-shadow: -2px 0 blue, 2px 0 red; }
      }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      
      @keyframes scanMove {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(200%); }
      }
      
      @keyframes glowPulse {
        0% { opacity: 0.3; }
        50% { opacity: 0.8; }
        100% { opacity: 0.3; }
      }
      
      @keyframes matrixFall {
        0% { opacity: 0; transform: translateY(-20px); }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { opacity: 0; transform: translateY(100px); }
      }
      
      .title {
        font-family: 'Courier New', monospace;
        font-size: 34px;
        font-weight: bold;
        fill: #0f0;
        animation: glitchPulse 3s infinite;
      }
      
      .subtitle {
        font-family: 'Courier New', monospace;
        font-size: 16px;
        fill: #bbffbb;
      }
      
      .terminal-text {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        fill: #abffab;
      }
      
      .prompt {
        font-family: 'Courier New', monospace;
        font-size: 13px;
        fill: #ff5555;
        font-weight: bold;
      }
      
      .badge-text {
        font-family: 'Courier New', monospace;
        font-size: 11px;
        fill: #ff7777;
      }
      
      .badge-bg {
        fill: rgba(0, 0, 0, 0.66);
        stroke: #ff4444;
        stroke-width: 1;
      }
      
      .card-bg {
        fill: rgba(8, 14, 10, 0.75);
        stroke: #2aff6e33;
        stroke-width: 1.5;
        rx: 12;
      }
      
      .card-bg:hover {
        stroke: #66ff66;
      }
      
      .scanline {
        fill: rgba(0, 255, 0, 0.04);
        animation: scanMove 8s linear infinite;
      }
      
      .glow-text {
        fill: #0f0;
      }
      
      .cursor {
        animation: blink 1s step-end infinite;
      }
      
      .matrix-char {
        font-family: monospace;
        font-size: 10px;
        fill: #0f0;
        opacity: 0;
        animation: matrixFall 4s linear infinite;
      }
      
      hr {
        stroke: #ff4444;
        stroke-width: 1;
        stroke-dasharray: 5,5;
      }
      
      a {
        cursor: pointer;
      }
    </style>
    
    <radialGradient id="bgGradient" cx="20%" cy="30%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#030505"/>
    </radialGradient>
    
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f0"/>
      <stop offset="50%" stop-color="#6f6"/>
      <stop offset="100%" stop-color="#0a0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="1100" fill="url(#bgGradient)" rx="15"/>
  
  <!-- Matrix Code Rain Effect -->
  <g opacity="0.12">
    <text class="matrix-char" x="20" y="50" style="animation-delay: 0s">0</text>
    <text class="matrix-char" x="45" y="80" style="animation-delay: 0.5s">1</text>
    <text class="matrix-char" x="70" y="30" style="animation-delay: 1s">日</text>
    <text class="matrix-char" x="95" y="100" style="animation-delay: 1.5s">0</text>
    <text class="matrix-char" x="120" y="60" style="animation-delay: 2s">1</text>
    <text class="matrix-char" x="145" y="120" style="animation-delay: 0.3s">1</text>
    <text class="matrix-char" x="170" y="40" style="animation-delay: 0.8s">0</text>
    <text class="matrix-char" x="195" y="90" style="animation-delay: 1.2s">0</text>
    <text class="matrix-char" x="220" y="70" style="animation-delay: 1.7s">1</text>
    <text class="matrix-char" x="245" y="110" style="animation-delay: 2.2s">日</text>
    <text class="matrix-char" x="270" y="50" style="animation-delay: 0.4s">1</text>
    <text class="matrix-char" x="295" y="130" style="animation-delay: 0.9s">0</text>
    <text class="matrix-char" x="320" y="20" style="animation-delay: 1.4s">1</text>
    <text class="matrix-char" x="345" y="100" style="animation-delay: 1.9s">0</text>
    <text class="matrix-char" x="370" y="60" style="animation-delay: 2.4s">1</text>
    <text class="matrix-char" x="395" y="140" style="animation-delay: 0.1s">0</text>
    <text class="matrix-char" x="420" y="80" style="animation-delay: 0.6s">日</text>
    <text class="matrix-char" x="445" y="30" style="animation-delay: 1.1s">1</text>
    <text class="matrix-char" x="470" y="110" style="animation-delay: 1.6s">0</text>
    <text class="matrix-char" x="495" y="50" style="animation-delay: 2.1s">1</text>
    <text class="matrix-char" x="520" y="90" style="animation-delay: 2.6s">1</text>
    <text class="matrix-char" x="545" y="120" style="animation-delay: 0.2s">0</text>
    <text class="matrix-char" x="570" y="40" style="animation-delay: 0.7s">0</text>
    <text class="matrix-char" x="595" y="100" style="animation-delay: 1.2s">1</text>
    <text class="matrix-char" x="620" y="70" style="animation-delay: 1.7s">日</text>
    <text class="matrix-char" x="645" y="130" style="animation-delay: 2.2s">0</text>
    <text class="matrix-char" x="670" y="20" style="animation-delay: 0.5s">1</text>
    <text class="matrix-char" x="695" y="110" style="animation-delay: 1s">1</text>
    <text class="matrix-char" x="720" y="50" style="animation-delay: 1.5s">0</text>
    <text class="matrix-char" x="745" y="90" style="animation-delay: 2s">0</text>
    <text class="matrix-char" x="770" y="140" style="animation-delay: 2.5s">1</text>
    <text class="matrix-char" x="795" y="60" style="animation-delay: 0.3s">0</text>
    <text class="matrix-char" x="820" y="100" style="animation-delay: 0.8s">日</text>
    <text class="matrix-char" x="845" y="30" style="animation-delay: 1.3s">1</text>
    <text class="matrix-char" x="870" y="120" style="animation-delay: 1.8s">0</text>
  </g>
  
  <!-- Scanline Effect -->
  <rect class="scanline" width="900" height="30" y="-30" opacity="0.1"/>
  
  <!-- Glitch Overlay -->
  <rect width="900" height="1100" fill="rgba(0,255,0,0.02)" opacity="0.5">
    <animate attributeName="opacity" values="0.1;0.4;0.1;0.6;0.1" dur="6s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Header Section -->
  <text x="450" y="55" text-anchor="middle" class="title" fill="url(#titleGradient)"> SRIJAN KUMAR </text>
  <text x="450" y="85" text-anchor="middle" class="subtitle">{ Code • Break • Learn • Repeat }</text>
  
  <!-- Badge -->
  <rect x="320" y="100" width="260" height="28" class="badge-bg" rx="4"/>
  <text x="450" y="119" text-anchor="middle" class="badge-text">
    <tspan>🔒 ID: SRIJAN-KUMAR7</tspan>
  </text>
  
  <!-- Profile Hits -->
  <text x="450" y="158" text-anchor="middle" font-family="monospace" font-size="12" fill="#ff6666">
    📊 PROFILE HITS: 1,337+
  </text>
  
  <!-- Typing Effect (Static text with cursor animation) -->
  <rect x="180" y="175" width="540" height="36" rx="18" fill="rgba(3,3,3,0.5)" stroke="#0f0" stroke-width="0.5"/>
  <text x="450" y="198" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#0f0">
    &gt;_ Engineering Mind | Hacker Soul engaged
    <tspan class="cursor" dx="5">_</tspan>
  </text>
  
  <!-- WHOAMI Card -->
  <rect x="25" y="230" width="540" height="280" class="card-bg"/>
  <text x="40" y="255" class="prompt">$&gt; whoami</text>
  <text x="40" y="278" class="terminal-text"> B.Tech Engineering &amp; Computational Mechanics</text>
  <text x="40" y="302" class="terminal-text"> Machine Learning &amp; Computer Vision — Weaponized AI</text>
  <text x="40" y="326" class="terminal-text"> Full-Stack Developer | System-level thinker</text>
  <text x="40" y="350" class="terminal-text"> Exploit chaser | Secure code architect</text>
  <text x="40" y="374" class="terminal-text"> Debugging at 2AM: mandatory ritual</text>
  
  <text x="40" y="405" class="prompt">$&gt; current_focus --show</text>
  
  <!-- Focus badges -->
  <rect x="40" y="415" width="120" height="24" fill="#1a1a1a" stroke="#ff4444" stroke-width="0.8" rx="4"/>
  <text x="100" y="431" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff7777">🧠 ML/AI systems</text>
  
  <rect x="170" y="415" width="135" height="24" fill="#1a1a1a" stroke="#ff4444" stroke-width="0.8" rx="4"/>
  <text x="237" y="431" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff7777">👁️ Computer Vision</text>
  
  <rect x="315" y="415" width="150" height="24" fill="#1a1a1a" stroke="#ff4444" stroke-width="0.8" rx="4"/>
  <text x="390" y="431" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff7777">⚡ Scalable full-stack</text>
  
  <rect x="40" y="445" width="135" height="24" fill="#1a1a1a" stroke="#ff4444" stroke-width="0.8" rx="4"/>
  <text x="107" y="461" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff7777">🛠️ Backend APIs</text>
  
  <rect x="185" y="445" width="150" height="24" fill="#1a1a1a" stroke="#ff4444" stroke-width="0.8" rx="4"/>
  <text x="260" y="461" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff7777">🔐 Security &amp; low-level</text>
  
  <!-- ASCII Art Section -->
  <rect x="580" y="230" width="295" height="280" class="card-bg"/>
  <text x="600" y="260" font-family="monospace" font-size="10" fill="#3eff3e">
    <tspan x="600" dy="0">   ┌─[┐]──[Srijan@cybercore]──[~]</tspan>
    <tspan x="600" dy="18">   └──╼  $&gt; ls -la exploits/</tspan>
    <tspan x="600" dy="18">   -rwx--x--x 1 root root 1337</tspan>
    <tspan x="600" dy="16">   Jan 01 2024  payload.bin</tspan>
    <tspan x="600" dy="18">   drwxr-xr-x 2 0x7f3 0x7f3</tspan>
    <tspan x="600" dy="16">   4096 Feb 14 2024  stealth_kit</tspan>
    <tspan x="600" dy="24">   💀 ⚡ 🕸️</tspan>
    <tspan x="600" dy="24">   root@exploit:~$ ./compile --danger</tspan>
  </text>
  
  <!-- Tech Stack Section -->
  <rect x="25" y="530" width="850" height="65" class="card-bg"/>
  <text x="40" y="552" class="prompt">🔧 weapon_arsenal --tech-stack</text>
  <text x="40" y="578" class="terminal-text">
    C • C++ • Python • JavaScript • HTML • CSS • React • Redux • OpenCV • Git • Linux • Figma
  </text>
  
  <!-- GitHub Stats Section -->
  <rect x="25" y="615" width="850" height="130" class="card-bg"/>
  <text x="40" y="640" class="prompt">📊 github_stats --display</text>
  
  <!-- Simulated GitHub Stats -->
  <rect x="40" y="655" width="400" height="75" rx="6" fill="rgba(0,0,0,0.4)" stroke="#2aff6e33" stroke-width="0.5"/>
  <text x="240" y="680" text-anchor="middle" font-family="monospace" font-size="14" fill="#0f0">📈 Contribution Activity</text>
  <text x="240" y="705" text-anchor="middle" font-family="monospace" font-size="11" fill="#abffab">Active contributor • Open source enthusiast</text>
  <text x="240" y="722" text-anchor="middle" font-family="monospace" font-size="10" fill="#6f6">███████████░░░░ 65%</text>
  
  <rect x="455" y="655" width="400" height="75" rx="6" fill="rgba(0,0,0,0.4)" stroke="#2aff6e33" stroke-width="0.5"/>
  <text x="655" y="680" text-anchor="middle" font-family="monospace" font-size="14" fill="#0f0">🏆 Top Languages</text>
  <text x="655" y="705" text-anchor="middle" font-family="monospace" font-size="11" fill="#abffab">Python • C++ • JavaScript</text>
  <text x="655" y="722" text-anchor="middle" font-family="monospace" font-size="10" fill="#6f6">Coding • Building • Breaking</text>
  
  
  <!-- Code Block -->
  <rect x="25" y="860" width="850" height="120" class="card-bg"/>
  <text x="40" y="885" class="prompt">&gt;_ exploit_lifecycle.cpp</text>
  <rect x="40" y="898" width="820" height="70" rx="6" fill="rgba(3,3,3,0.5)" stroke="#ff3333" stroke-width="1.5"/>
  <text x="60" y="922" font-family="monospace" font-size="12" fill="#6eff6e">
    <tspan x="60" dy="0">while(alive) {</tspan>
    <tspan x="75" dy="18">learn();      // rootkit of knowledge</tspan>
    <tspan x="75" dy="16">build();      // weaponized code</tspan>
