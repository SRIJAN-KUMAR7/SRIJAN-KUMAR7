  <!-- Social Links with Clickable URLs -->
  <text x="450" y="1058" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">
    https://codeforces.com/profile/srijankumar7 • https://kaggle.com/srijan kumar 0702
  </text>
  
  <!-- Footer Quote -->
  <text x="450" y="1085" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff4444">
